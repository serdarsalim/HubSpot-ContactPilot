<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ContactPilot</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #dce5ee;
        --muted: #53657a;
        --text: #1f2d3d;
        --brand: #0b5cab;
        --brand-soft: #e8f0fa;
        --sticky-head-h: 96px;
      }

      html {
        margin: 0;
        width: 860px;
        max-height: 620px;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #a6bacf transparent;
      }

      html::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      html::-webkit-scrollbar-thumb {
        background: #a6bacf;
        border-radius: 999px;
      }

      html::-webkit-scrollbar-track {
        background: transparent;
      }

      body {
        margin: 0;
        padding: 12px;
        width: 100%;
        box-sizing: border-box;
        overflow: visible;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .sticky-head {
        position: sticky;
        top: 0;
        z-index: 20;
        padding-top: 8px;
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      }

      .topbar h1 {
        margin: 0;
        font-size: 20px;
        color: var(--brand);
      }

      .title-brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .title-logo {
        width: 22px;
        height: 22px;
        color: #0b66c3;
        flex: 0 0 auto;
      }

      .title-logo path,
      .title-logo circle {
        fill: currentColor;
      }

      .title-tools {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .title-icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #5a6d82;
        border-radius: 8px;
        cursor: pointer;
        transition: color 120ms ease, transform 120ms ease;
      }

      .title-icon-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .title-icon-btn:hover {
        color: var(--brand);
        transform: translateY(-1px);
      }

      .title-icon-btn:disabled {
        opacity: 0.45;
        cursor: default;
        transform: none;
      }

      .title-icon-btn:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
      }

      .icon-btn,
      .btn {
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--text);
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      .icon-btn {
        padding: 8px 10px;
      }

      .btn {
        padding: 8px 10px;
      }

      .btn.primary {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      .icon-btn:hover,
      .btn:hover {
        filter: brightness(0.98);
      }

      .meta {
        margin: 0 0 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 13px;
        padding: 8px 10px 12px;
        background: var(--brand-soft);
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .status-text {
        margin: 0;
      }

      .status-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .status-actions[hidden] {
        display: none;
      }

      .status-action {
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        font: inherit;
        font-weight: 700;
        color: #1f2d3d;
        cursor: pointer;
      }

      .status-action:hover {
        text-decoration: underline;
      }

      .status-action:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      .row-action-btn {
        border: 0;
        background: transparent;
        color: #23466d;
        border-radius: 0;
        padding: 0;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .row-action-btn:hover {
        text-decoration: underline;
      }

      .row-action-btn:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
      }

      .list {
        overflow: visible;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto;
      }

      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #edf2f7;
        font-size: 13px;
        vertical-align: top;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th.plain,
      td.plain {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th {
        background: #eef4fb;
        color: #24476d;
        font-weight: 700;
        position: sticky;
        top: var(--sticky-head-h);
        z-index: 1;
        height: 56px;
        box-sizing: border-box;
        vertical-align: middle;
      }

      th.sortable {
        cursor: pointer;
        user-select: none;
      }

      th.sortable:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: -2px;
      }

      tr:last-child td {
        border-bottom: none;
      }

      td.sel,
      th.sel {
        width: 28px;
        min-width: 28px;
        max-width: 28px;
        padding-left: 6px;
        padding-right: 6px;
        text-align: center;
      }

      th.col-fixed,
      td.col-fixed {
        width: 250px;
        min-width: 250px;
        max-width: 250px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th.col-elastic,
      td.col-elastic {
        width: auto;
        min-width: 140px;
        max-width: none;
      }

      th.col-fluid,
      td.col-fluid {
        width: auto;
        max-width: none;
      }

      th.actions,
      td.actions {
        width: 220px;
        min-width: 220px;
        max-width: 220px;
        white-space: nowrap;
        border-left: 1px solid #edf2f7;
      }

      th.actions {
        position: sticky;
        top: var(--sticky-head-h);
        z-index: 1;
        background: #eef4fb;
      }

      td.actions {
        vertical-align: top;
      }

      td.actions .row-action-btn {
        margin: 0;
        display: inline-flex;
      }

      .row-actions-wrap {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
      }

      th.name,
      td.name {
        max-width: 180px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.name {
        font-weight: 600;
      }

      td.name a {
        color: inherit;
        text-decoration: none;
        font-weight: inherit;
      }

      td.name a:hover {
        text-decoration: underline;
      }

      td.name a:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      th.email,
      td.email {
        max-width: 220px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.email {
        color: #4f6274;
      }

      th.phone,
      td.phone {
        width: 120px;
        min-width: 120px;
        max-width: 120px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.phone a {
        display: inline-block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #0b66c3;
        text-decoration: none;
        font-weight: 600;
      }

      td.phone a:hover {
        text-decoration: underline;
      }

      td.phone a:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      th.possibility,
      td.possibility {
        max-width: 120px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.possibility {
        color: #334e68;
      }

      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 25, 38, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .settings-overlay.open {
        display: flex;
      }

      .notes-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 25, 38, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1050;
      }

      .notes-overlay.open {
        display: flex;
      }

      .email-template-pick-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 25, 38, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1060;
      }

      .email-template-pick-overlay.open {
        display: flex;
      }

      .settings-card {
        width: 440px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(8, 30, 60, 0.15);
      }

      .notes-card {
        width: 560px;
        max-width: calc(100vw - 32px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(8, 30, 60, 0.15);
        text-align: center;
      }

      .email-template-pick-card {
        width: 560px;
        max-width: calc(100vw - 32px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(8, 30, 60, 0.15);
      }

      .settings-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .notes-head {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 12px;
      }

      .settings-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .notes-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .notes-list {
        min-height: 80px;
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #e5edf5;
        background: #f8fbff;
        border-radius: 10px;
        padding: 8px;
        margin-bottom: 12px;
        text-align: left;
      }

      .note-item {
        padding: 8px;
        background: #fff;
        border: 1px solid #e5edf5;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 13px;
        line-height: 1.35;
        color: #22384f;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .note-item:last-child {
        margin-bottom: 0;
      }

      .notes-empty {
        font-size: 13px;
        color: #5e7084;
        padding: 6px 4px;
      }

      .field {
        margin-bottom: 12px;
      }

      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .field input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
      }

      .field textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        min-height: 80px;
      }

      .checks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .check {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        font-size: 13px;
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 8px;
      }

      .email-templates-page {
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 596px;
        min-height: 0;
      }

      .email-templates-page[hidden] {
        display: none;
      }

      .email-templates-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .email-templates-title {
        margin: 0;
        font-size: 20px;
        color: var(--brand);
      }

      .email-templates-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .email-templates-shell {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 14px;
        flex: 1;
        min-height: 0;
      }

      .email-templates-sidebar,
      .email-template-editor-pane {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card);
        min-height: 0;
        box-shadow: 0 4px 12px rgba(16, 45, 78, 0.04);
      }

      .email-templates-sidebar {
        display: flex;
        flex-direction: column;
      }

      .email-templates-sidebar-head {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border-bottom: 1px solid #e6edf5;
      }

      .email-templates-sidebar-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: #2d435b;
      }

      .email-add-template-btn {
        width: 100%;
      }

      .email-templates-list {
        padding: 10px;
        overflow-y: auto;
        flex: 1;
        min-height: 0;
      }

      .email-template-list-btn {
        width: 100%;
        border: 1px solid #e3ebf4;
        background: #fff;
        color: var(--text);
        border-radius: 10px;
        padding: 11px;
        text-align: left;
        cursor: pointer;
        margin-bottom: 8px;
        transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
      }

      .email-template-list-btn:hover {
        border-color: #c7d7e9;
        box-shadow: 0 2px 8px rgba(12, 54, 98, 0.08);
        transform: translateY(-1px);
      }

      .email-template-list-btn.active {
        background: linear-gradient(180deg, #f6fbff 0%, #edf5ff 100%);
        border-color: #b9d1ea;
      }

      .email-template-list-name {
        display: block;
        font-size: 13px;
        font-weight: 700;
      }

      .email-template-list-btn.active .email-template-list-name {
        color: var(--brand);
      }

      .email-template-list-meta {
        display: block;
        margin-top: 3px;
        font-size: 12px;
        color: var(--muted);
      }

      .email-template-editor-pane {
        display: flex;
        flex-direction: column;
        padding: 14px;
      }

      .email-template-editor {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        flex: 1;
      }

      .email-template-editor .field {
        margin-bottom: 0;
      }

      .email-template-editor .field-grow {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .email-template-editor .field-grow textarea {
        flex: 1;
        min-height: 0;
        resize: none;
      }

      .email-template-inline-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: -2px;
      }

      .email-template-empty {
        color: var(--muted);
        padding: 12px;
        font-size: 13px;
        border: 1px dashed #dce6f2;
        border-radius: 10px;
        background: #f7fbff;
      }

      .email-template-pick-list {
        max-height: 320px;
        overflow-y: auto;
        border: 1px solid #e5edf5;
        border-radius: 10px;
        background: #f8fbff;
        padding: 8px;
      }

      .email-template-pick-item {
        width: 100%;
        border: 1px solid #d7e5f4;
        border-radius: 10px;
        background: #fff;
        text-align: left;
        cursor: pointer;
        padding: 10px;
        margin-bottom: 8px;
      }

      .email-template-pick-item:last-child {
        margin-bottom: 0;
      }

      .email-template-pick-item:hover {
        border-color: #c3d9ef;
        background: #f7fbff;
      }

      .email-template-pick-name {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: #173656;
      }

      .email-template-pick-preview {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: #53657a;
      }

      .btn.danger {
        border-color: #dfc5c5;
        color: #8a2d2d;
      }

      .template-note {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="mainPage">
      <div id="stickyHead" class="sticky-head">
        <div class="topbar">
          <h1 class="title-brand">
            <svg class="title-logo" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14.2 3.2c.2-.8-.7-1.3-1.3-.8l-4 3.5-4.7.8c-.8.1-1.1 1.2-.5 1.7l3.2 2.6-.7 4.2c-.1.8.7 1.4 1.4 1l3.8-2 2.9 3.4c.5.6 1.5.3 1.6-.5l.7-4.8 3.1-3c.6-.6.2-1.6-.6-1.6h-4l-1.9-4.5z"></path>
              <circle cx="8.8" cy="10.1" r="1.1"></circle>
            </svg>
            <span>ContactPilot</span>
          </h1>
          <div class="title-tools">
            <button id="refreshBtn" class="title-icon-btn" aria-label="Refresh contacts" title="Refresh contacts">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                <polyline points="21 3 21 9 15 9"></polyline>
              </svg>
            </button>
            <button id="emailSettingsBtn" class="title-icon-btn" aria-label="Open email templates" title="Open email templates">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="M3 7l9 6 9-6"></path>
              </svg>
            </button>
            <button id="settingsBtn" class="title-icon-btn" aria-label="Open settings" title="Open settings">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.33 1V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-.33-1 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1-.33H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1-.33 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .33-1V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 .33 1 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.26.3.45.65.6 1 .08.31.11.63.1.95a2 2 0 0 1 1.9 2.05 2 2 0 0 1-1.9 2.05c.01.32-.02.64-.1.95-.15.35-.34.7-.6 1z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div id="status" class="status">
          <span id="statusText" class="status-text">Loading contacts...</span>
          <span id="statusActions" class="status-actions" hidden>
            <button id="csvSelectedBtn" class="status-action" type="button">CSV Selected</button>
            <button id="vcfSelectedBtn" class="status-action" type="button">VCF Selected</button>
            <button id="copyEmailBtn" class="status-action" type="button">Copy Email</button>
          </span>
        </div>
      </div>
      <div id="list" class="list"></div>
    </div>

    <section id="emailTemplatesPage" class="email-templates-page" hidden>
      <div class="email-templates-header">
        <h2 class="email-templates-title">Email Templates</h2>
        <div class="email-templates-actions">
          <button id="closeEmailTemplatesPageBtn" class="btn" type="button">Back</button>
        </div>
      </div>
      <p class="template-note">Tokens: [name], [first_name], [email], [phone], [possibility]</p>
      <div class="email-templates-shell">
        <aside class="email-templates-sidebar">
          <div class="email-templates-sidebar-head">
            <h3 class="email-templates-sidebar-title">Templates</h3>
            <button id="addEmailTemplateBtn" class="btn primary email-add-template-btn" type="button">Add Template</button>
          </div>
          <div id="emailTemplatesList" class="email-templates-list"></div>
        </aside>
        <section class="email-template-editor-pane">
          <div id="emailTemplateEmpty" class="email-template-empty">Select a template from the left or create a new one.</div>
          <div id="emailTemplateEditor" class="email-template-editor" hidden>
            <div class="field">
              <label for="emailTemplateNameInput">Template name</label>
              <input id="emailTemplateNameInput" type="text" />
            </div>
            <div class="email-template-inline-actions">
              <button id="saveEmailTemplatesPageBtn" class="btn primary" type="button">Save Template</button>
              <button id="deleteEmailTemplateBtn" class="btn danger" type="button">Delete Template</button>
            </div>
            <div class="field">
              <label for="emailTemplateSubjectInput">Subject</label>
              <input id="emailTemplateSubjectInput" type="text" />
            </div>
            <div class="field field-grow">
              <label for="emailTemplateBodyInput">Body</label>
              <textarea id="emailTemplateBodyInput"></textarea>
            </div>
          </div>
        </section>
      </div>
    </section>

    <div id="settingsOverlay" class="settings-overlay">
      <div class="settings-card">
        <div class="settings-head">
          <h2>Settings</h2>
        </div>

        <div class="field">
          <label for="countryPrefixInput">Default country prefix (digits only)</label>
          <input id="countryPrefixInput" type="text" placeholder="60" />
        </div>

        <div class="field">
          <label for="messageTemplateInput">Default WhatsApp message (prefilled, use [name] for first name)</label>
          <textarea id="messageTemplateInput" placeholder="Hi, I am reaching out regarding..."></textarea>
        </div>

        <div class="field">
          <label for="noteTemplateInput">Default note for Actions > Notes</label>
          <textarea id="noteTemplateInput"></textarea>
        </div>

        <div class="field">
          <label for="rowFilterInput">Filter out rows containing this word</label>
          <input id="rowFilterInput" type="text" placeholder="preview" />
        </div>

        <div class="field">
          <label>Columns to show</label>
          <div id="columnChecks" class="checks"></div>
        </div>

        <div class="settings-actions">
          <button id="cancelSettingsBtn" class="btn">Cancel</button>
          <button id="saveSettingsBtn" class="btn primary">Save</button>
        </div>
      </div>
    </div>

    <div id="notesOverlay" class="notes-overlay">
      <div class="notes-card">
        <div class="notes-head">
          <h2 id="notesTitle">Notes</h2>
        </div>

        <div id="notesList" class="notes-list">
          <div class="notes-empty">Loading notes...</div>
        </div>

        <div class="field">
          <label for="notesTextInput">Add note</label>
          <textarea id="notesTextInput"></textarea>
        </div>

        <div class="settings-actions">
          <button id="cancelNotesBtn" class="btn">Close</button>
          <button id="saveNoteBtn" class="btn primary">Save Note</button>
        </div>
      </div>
    </div>

    <div id="emailTemplatePickOverlay" class="email-template-pick-overlay">
      <div class="email-template-pick-card">
        <div class="settings-head">
          <h2 id="emailTemplatePickTitle">Select Email Template</h2>
        </div>
        <div id="emailTemplatePickList" class="email-template-pick-list"></div>
        <div class="settings-actions">
          <button id="cancelEmailTemplatePickBtn" class="btn" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script src="shared/messages.js"></script>
    <script src="shared/config.js"></script>
    <script src="popup/core.js"></script>
    <script src="popup/hubspotApi.js"></script>
    <script src="popup/settings.js"></script>
    <script src="popup/emailTemplates.js"></script>
    <script src="popup/notesFlow.js"></script>
    <script src="popup/contactsView.js"></script>
    <script src="popup/exportUtils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
