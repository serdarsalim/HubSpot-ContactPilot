<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HubSpot WhatsApp Contacts</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #dce5ee;
        --muted: #53657a;
        --text: #1f2d3d;
        --brand: #0b5cab;
        --brand-soft: #e8f0fa;
        --sticky-head-h: 96px;
      }

      html {
        margin: 0;
        width: 860px;
        max-height: 620px;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: #a6bacf transparent;
      }

      html::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      html::-webkit-scrollbar-thumb {
        background: #a6bacf;
        border-radius: 999px;
      }

      html::-webkit-scrollbar-track {
        background: transparent;
      }

      body {
        margin: 0;
        padding: 12px;
        width: 100%;
        box-sizing: border-box;
        overflow: visible;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .sticky-head {
        position: sticky;
        top: 0;
        z-index: 20;
        padding-top: 8px;
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      }

      .topbar h1 {
        margin: 0;
        font-size: 20px;
        color: var(--brand);
      }

      .title-tools {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .title-icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #5a6d82;
        border-radius: 8px;
        cursor: pointer;
        transition: color 120ms ease, transform 120ms ease;
      }

      .title-icon-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .title-icon-btn:hover {
        color: var(--brand);
        transform: translateY(-1px);
      }

      .title-icon-btn:disabled {
        opacity: 0.45;
        cursor: default;
        transform: none;
      }

      .title-icon-btn:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
      }

      .icon-btn,
      .btn {
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--text);
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      .icon-btn {
        padding: 8px 10px;
      }

      .btn {
        padding: 8px 10px;
      }

      .btn.primary {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      .icon-btn:hover,
      .btn:hover {
        filter: brightness(0.98);
      }

      .meta {
        margin: 0 0 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 13px;
        padding: 8px 10px 12px;
        background: var(--brand-soft);
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .status-text {
        margin: 0;
      }

      .status-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      .status-actions[hidden] {
        display: none;
      }

      .status-action {
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        font: inherit;
        font-weight: 700;
        color: #1f2d3d;
        cursor: pointer;
      }

      .status-action:hover {
        text-decoration: underline;
      }

      .status-action:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      .row-action-btn {
        border: 0;
        background: transparent;
        color: #23466d;
        border-radius: 0;
        padding: 0;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .row-action-btn:hover {
        text-decoration: underline;
      }

      .row-action-btn:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
      }

      .list {
        overflow: visible;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: auto;
      }

      th,
      td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #edf2f7;
        font-size: 13px;
        vertical-align: top;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th.plain,
      td.plain {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th {
        background: #eef4fb;
        color: #24476d;
        font-weight: 700;
        position: sticky;
        top: var(--sticky-head-h);
        z-index: 1;
        height: 56px;
        box-sizing: border-box;
        vertical-align: middle;
      }

      th.sortable {
        cursor: pointer;
        user-select: none;
      }

      th.sortable:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: -2px;
      }

      tr:last-child td {
        border-bottom: none;
      }

      td.sel,
      th.sel {
        width: 28px;
        min-width: 28px;
        max-width: 28px;
        padding-left: 6px;
        padding-right: 6px;
        text-align: center;
      }

      th.col-fixed,
      td.col-fixed {
        width: 250px;
        min-width: 250px;
        max-width: 250px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th.col-elastic,
      td.col-elastic {
        width: auto;
        min-width: 140px;
        max-width: none;
      }

      th.col-fluid,
      td.col-fluid {
        width: auto;
        max-width: none;
      }

      th.actions,
      td.actions {
        width: 116px;
        min-width: 116px;
        max-width: 116px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-left: 1px solid #edf2f7;
      }

      th.actions {
        position: sticky;
        top: var(--sticky-head-h);
        z-index: 1;
        background: #eef4fb;
      }

      td.actions {
        vertical-align: top;
      }

      td.actions .row-action-btn {
        margin: 0;
        display: inline-flex;
      }

      th.name,
      td.name {
        max-width: 180px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.name {
        font-weight: 600;
      }

      td.name a {
        color: inherit;
        text-decoration: none;
        font-weight: inherit;
      }

      td.name a:hover {
        text-decoration: underline;
      }

      td.name a:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      th.email,
      td.email {
        max-width: 220px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.email {
        color: #4f6274;
      }

      th.phone,
      td.phone {
        max-width: 170px;
        white-space: nowrap;
      }

      td.phone a {
        color: #0b66c3;
        text-decoration: none;
        font-weight: 600;
      }

      td.phone a:hover {
        text-decoration: underline;
      }

      td.phone a:focus-visible {
        outline: 2px solid #0b66c3;
        outline-offset: 2px;
        border-radius: 4px;
      }

      th.possibility,
      td.possibility {
        max-width: 120px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      td.possibility {
        color: #334e68;
      }

      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 25, 38, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .settings-overlay.open {
        display: flex;
      }

      .notes-overlay {
        position: fixed;
        inset: 0;
        background: rgba(13, 25, 38, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1050;
      }

      .notes-overlay.open {
        display: flex;
      }

      .settings-card {
        width: 440px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(8, 30, 60, 0.15);
      }

      .notes-card {
        width: 560px;
        max-width: calc(100vw - 32px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 20px 40px rgba(8, 30, 60, 0.15);
      }

      .settings-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .notes-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .settings-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .notes-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .notes-list {
        min-height: 80px;
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #e5edf5;
        background: #f8fbff;
        border-radius: 10px;
        padding: 8px;
        margin-bottom: 12px;
      }

      .note-item {
        padding: 8px;
        background: #fff;
        border: 1px solid #e5edf5;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 13px;
        line-height: 1.35;
        color: #22384f;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .note-item:last-child {
        margin-bottom: 0;
      }

      .notes-empty {
        font-size: 13px;
        color: #5e7084;
        padding: 6px 4px;
      }

      .field {
        margin-bottom: 12px;
      }

      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .field input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
      }

      .field textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        min-height: 80px;
      }

      .checks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .check {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        font-size: 13px;
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="stickyHead" class="sticky-head">
      <div class="topbar">
        <h1>HubSpot Contacts</h1>
        <div class="title-tools">
          <button id="refreshBtn" class="title-icon-btn" aria-label="Refresh contacts" title="Refresh contacts">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
              <polyline points="21 3 21 9 15 9"></polyline>
            </svg>
          </button>
          <button id="settingsBtn" class="title-icon-btn" aria-label="Open settings" title="Open settings">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.33 1V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-.33-1 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1-.33H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1-.33 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .33-1V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 .33 1 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.26.3.45.65.6 1 .08.31.11.63.1.95a2 2 0 0 1 1.9 2.05 2 2 0 0 1-1.9 2.05c.01.32-.02.64-.1.95-.15.35-.34.7-.6 1z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div id="status" class="status">
        <span id="statusText" class="status-text">Loading contacts...</span>
        <span id="statusActions" class="status-actions" hidden>
          <button id="csvSelectedBtn" class="status-action" type="button">CSV Selected</button>
          <button id="vcfSelectedBtn" class="status-action" type="button">VCF Selected</button>
          <button id="copyEmailBtn" class="status-action" type="button">Copy Email</button>
          <button id="logWhatsappBtn" class="status-action" type="button">Log WhatsApp Note</button>
        </span>
      </div>
    </div>
    <div id="list" class="list"></div>

    <div id="settingsOverlay" class="settings-overlay">
      <div class="settings-card">
        <div class="settings-head">
          <h2>Settings</h2>
        </div>

        <div class="field">
          <label for="countryPrefixInput">Default country prefix (digits only)</label>
          <input id="countryPrefixInput" type="text" placeholder="60" />
        </div>

        <div class="field">
          <label for="messageTemplateInput">Default WhatsApp message (prefilled, use [name] for first name)</label>
          <textarea id="messageTemplateInput" placeholder="Hi, I am reaching out regarding..."></textarea>
        </div>

        <div class="field">
          <label for="noteTemplateInput">Default note for Actions > Notes</label>
          <textarea id="noteTemplateInput"></textarea>
        </div>

        <div class="field">
          <label for="rowFilterInput">Filter out rows containing this word</label>
          <input id="rowFilterInput" type="text" placeholder="preview" />
        </div>

        <div class="field">
          <label>Columns to show</label>
          <div id="columnChecks" class="checks"></div>
        </div>

        <div class="settings-actions">
          <button id="cancelSettingsBtn" class="btn">Cancel</button>
          <button id="saveSettingsBtn" class="btn primary">Save</button>
        </div>
      </div>
    </div>

    <div id="notesOverlay" class="notes-overlay">
      <div class="notes-card">
        <div class="notes-head">
          <h2 id="notesTitle">Notes</h2>
        </div>

        <div id="notesList" class="notes-list">
          <div class="notes-empty">Loading notes...</div>
        </div>

        <div class="field">
          <label for="notesTextInput">Add note</label>
          <textarea id="notesTextInput"></textarea>
        </div>

        <div class="settings-actions">
          <button id="cancelNotesBtn" class="btn">Close</button>
          <button id="saveNoteBtn" class="btn primary">Save Note</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
